body:
  text: 四六談麈詩文評類提要臣等謹案四六談麈一巻宋謝伋撰伋字景思上蔡人參政克家之子良佐之從孫官至太常少卿伋自號靈石山藥寮書中所稱逍遥公即良佐也其論四六多以命意遣詞分别工拙較王銍四六話所見較深其謂四六施于制誥表奏文檄本以便宣讀多以四字六字為句宣和間多用全文長句為對習尚之久至今未能全變前輩無此格又謂四六之工在于剪裁若全句對全句何以見工尤切中南宋之弊其中所摘名人成句雖與他書複見者多然皆自有獨賞不同勦拾如廖明畧一人王銍四六話採其賀安厚卿張丞相諸啟凡十數聯而伋槩不之及獨録其為厚卿舉掛功徳疏一篇為銍所不取者亦足見其識鑒之不茍費衮梁溪漫志有云謝景思四六談麈甚新竒然載陳去非草朱丞相制有語忌令貼改事又載謝顯道初不入黨籍朱震乞依黨籍命官事皆誤朱制乃有㫖令綦處厚貼麻非令其自貼改謝顯道崇寜元年曾入黨籍景思記當時所見偶爾差舛恐誤作史者故為正之云云是伋所載亦間有舛誤要其大致多可採取固不以一眚掩也乾隆四十六年三月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀四六談塵原序三代兩漢以前訓誥誓命詔䇿書疏無駢麗粘綴温潤爾雅先唐以還四六始盛大約取便於宣讀本朝自歐陽文忠王舒國叙事之外作為文章制作渾成一洗西崑磔裂煩碎之體厥後學之者益以衆多况朝廷以此取士名為博學宏詞而内外兩制用之四六之藝誠曰大矣下至往來牋記啟狀皆有定式故謂之應用四方一律可不習而知予自少時聽長老持論多矣憂患以後悉皆遺忘山居厯年飽食終日因後生之問可記者輙錄之以資讃學之一事如古今五七字話題為四六談麈云他時有得當附益諸紹興十一年五月十三日陽夏謝伋序
