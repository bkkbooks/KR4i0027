body:
  text: 四六談麈宋謝伋撰四六施於制誥表奏文檄本以便於宣讀多以四字六字為句宣和間多用全文長句為對習尚之久至今未能全變前輩無此體也此起於咸平王相翰苑之作人多倣之四六之工在於剪裁何必以全句對全句為工四六經語對經語史語對史語詩語對詩語方妥帖太祖郊祀陶穀作文不以籩豆有楚對黍稷非馨而曰豆籩陳有楚之儀黍稷奉惟馨之薦近世王初寮在翰苑作寶籙宫青詞云上天之載無聲下民之虐匪降時人許其裁剪丁晉公謝表云補仲山之衮雖罄一心調傅説之羮難諧衆口後人改云雖曲盡於巧心終難諧於衆口王荆公在金陵有中使傳宣撫問并賜銀盒藥茶令中外各作一表既具藁無可公意者公遂自作今見集中其詞云信使恩言有華原隰寳奩珍劑増賁丘園蓋五事見四句中言約意盡衆以為不及也孫巨源作除太尉制云秦官太尉漢代三公語典而重元章簡公厚之致仕表云正至衣冠莫綴邇聮之列嵗時牛酒尚霑甲令之恩又謝越州表云驅車萬里虛出玉闗之門乘駟一麾幸至㑹稽之邸謝子耆寕除職表云疲牛抱犢同均豐草之甘倦鳥将雛不失上林之樂皆為人稱誦其作王荆公相麻亦世所稱工然腦詞乃云若礪與舟世莫先於汝作有衮及繡人久佇於公歸或以為先後失倫隆祐復位制蔡元長草其詞曰雖元符建號巳位於中宫而永泰上賓無嫌於並后陳了翁作蔡彈文云北門翰長乃手草發詔之人復后麻詞又躬寫慈闈之㫖以謂訓出東朝則先帝當時不得不從事於泰陵則陛下今日安敢輕改熙寧間鄧潤甫作邢妃麻云周南之咏卷耳無險詖私謁之心齊詩之美雞鳴有警戒相成之道後王荆公退居金陵屢用之四六全在編類古語唐李義山有金鑰宋景文有一字至十字對司馬文正亦有金桴王岐公最多唐李義山别為四六集本朝歐陽公亦别為集夏英公元章簡書肆亦有小集祭文唐人多用四六韓退之亦然東坡嶺外歸與人啟云七年逺謫不意自全萬里生還適有天幸所襯字皆漢人語也又黄門謝復官表一毫以上皆出於帝恩累嵗偷安有慚於公議秋毫以上皆帝力也用張敖語政和以後宰執多不答外郡書啟舊見司馬温公元祐間啟在外監司郡守賀啟云豈期聖澤遽陟宰司覆餗致凶實民瞻之未允循墻引避顧天意之靡囘成命既頒愧顔無寄重煩謙徳逺貺徽言陳後山無巳賀梁右轄啟云辭榮遁禄雖自計之甚都挈國躋民如人望之未巳劉丞相莘老罷相自鄆徙青謝表云東方大國莫如鄆青微臣何人繼為帥守趙清憲正夫自禮部侍郎除中司謝表云省部六曹禮為清選憲臺三院丞總大綱廖明略正一為四六甚工舊見為安厚卿舉掛功徳疏云梁木其摧嘆哲人之逝天堂若有須君子而登生也有涯没而不朽痛兩楹之夢奠圯萬里之長城其祭文云昊天不惠奪我元老唐安得鑑楚弗觀寳盛徳且然小智寧保先公云明略生平之學熟於髙氏小史李成季昭玘嘗為起居舍人最工四六漢老之叔也有静菴先生集行於世叅政漢先坐其兄㑹稽失守落職謝章云包胥不食而哭秦素心猶在李陵得當而報漢後效難期隆祐哀册徐師川撰云作合泰陵賢而不見答制政房闥聖而不可知席大光偶目𤯝辭其書遂以命趙叔簡書之馬溳巨濟宣和間謝復承事郎表云岧嶤丹闕如曽清夢之遊藍縷綠衣猶是廣庭之賜舊制曽任監察御史以上皆通相元中宣和間當外制作河北曲赦云桑麻千里皆祖宗涵養之休忠義百年亦父老教訓之徳又作种師中制云系出終南處士之後世有山西良将之規王雲子飛早有文名之官豫章元中當外制其謝表云洶鯨波之再涉偶遂生還恍芸省之暫游旋從外補王嘗隨奉使髙麗作書状也又云敢期文陛之一登所望修門之重入孫仲益直院草黄懋和罷相制云移股肱者固非朕志作耳目者言皆汝尤又謝吏部侍郎表云名節壞於謗讒孰聽鼠牙之訟精神銷於憂患屢驚馬尾之書髙平范相謝罷相表云常欲慎惜名器俾士夫革奔競之風不敢妄圗事功兾宗社獲和平之福翟叅政公㢲與公書取此云庶幾革奔競之風格和平之福如公所云也紹興曲赦福建本翟公㢲為承㫖當制翟大叅綦叔厚直院當制遂用其文其曰朕臨朝不怡視古太息者是也綦叔厚草蜀将制曰巳失秦川之險敢言蜀道之難辛炳為司徒遽作彈文曰川未失也綦自辨其語上曰朕知之矣卿所言者我能往㓂亦能往陳去非草故相義陽公起復制云眷予次輔方宅大憂有以宅憂為言者令貼麻陳改云方服私艱説者又以為語忌王初寮草鄭華陽持餘服麻云惟君臣相與之際當諒乃心顧忠孝兩全之難重違所請叔祖逍遥公舊為四六極其精思嘗作謝改官啟云志在天下豈若陳孺子之云乎身寄人間得如馬少游而足矣有雜編事類號武庫兵火後亡之叔祖逍遥公初不入黨籍朱震子發内相以初廢錮乞依黨籍例命一子官伋代作謝啟云念昔先人親逢命世升堂傳道有自淵源刻石刋章偶逃黨部上元豐太常之第奉建中宣室之咨忤彼權臣斥從常調程門髙弟如逍遥公楊中立游定夫皆工四六後之學者乃謂談經者不習此豈其然乎林述中適帥福日見之舉召試舍人時除節度使麻云無怠無荒以來王朕敢忘於慎徳有嚴有翼而後共武無忝於懋功趙承之鼎臣作謝李元量釡狀元啟云嘉禾當御輙先農夫之嘗神龜效靈偶出豫且之網政和間北使謝柑實表云聘禮式陳祝帝齡於紫闕宸恩特異錫仙宴於公郵方厥包未貢之期捧慈徳惟馨之賜天香彌袖染湘水之清寒雲液盈盤浥洞庭之餘潤梓里豈遑於遺母楓庭切願於獻君蔡元長内翰靖康中謝淮東茶鹽表云睠兹摘山之利蓋出當時之權明詔惟行盡復祖宗之舊微生何幸願還畎畝之中先公除翰苑以祖諱辭有㫖銜内權不繫三字先公以不帶三字止同職名不可赴院供職又固辭徐述古制云玉帳談兵巳興嗟於見晩金鑾草制兹無恨於同時靖康内降王氏封國夫人淵聖中批可入朕之乳母四字先公奏云當於腦詞下稱皇帝乳母某氏而草云早參慈保之嚴謹於燥濕之視宣和内禪王循徳為承㫖當草赦事出倉卒云紹二百年之祚運奠三萬里之幅員施及眇躬嗣膺神器永念纉承之重懼極淵氷載惟臨御之艱憂深朽索及内禪皇太子詔到天下方曉然吕成公求退表云侵尋甲子六十有三補報朝廷萬分無一乃出於李黄門邦直翟大參以陳東之事自越援杭其謝降官表云豈比秦人坐視越人之瘠欲安劉氏固知吕氏之危趙令人李號易安其祭湖州文曰白日正中嘆龎翁之機㨗堅城自墮憐杞婦之悲深婦人四六之工者席參政大光作嗣安定制頌太祖曰爾惟元孫予曰伯父其謝潭帥表云暴楊之惡初過於共兜播告之詞忽同於方召方念蒙上時相啟云三巳無怨難知衆口之爍金萬折必東自信臣心之如水下句完善常子正同作任公甫致政詞云熟本朝之故事迨聞正始之風迎代邸而清官獨奉渭橋之謁對似少偏政和間以僧為徳士冠服如道士有長老升堂云石忩奪得裴休笏用在今朝曹溪留下祖師衣已為陳迹又一長老乞入道表云一習蠻夷之風教遂忘父母之髪膚幾同去國之人忽指一天之斗倘得囘心而嚮道便當合掌以擎拳汪退傅初坐陳東歐陽澈事降官後復以啟謝廟堂時相作答啟云一男子之上書人何足道諸大夫曰可殺公豈容心熊太學叔雅詞也靖康間京尹陳伯起謝賜出守牙簡表云看山拄頰敢為晉士之清狂上馬設囊豈有唐賢之風度汪彦章詞康平仲執權在揚州時舉對制以示伋云想望夷門未冺葱䓤之佳氣顧瞻淮甸安能欝欝而久居何文縝以曲學罷正字其謝章云師友淵源妄遥探於千載文章戸牖期自立於一家獨簡聖知何名曲學外大父晁舍人謝落職表云投鼠忌器輙詈天子之從臣剪爪及膚不識朝廷之大體指耿黄門而言葉石林少藴知福州其賀朝㑹表云繄昔艱難孰測聖人之勇迨兹平定益知天子之尊陸益中徳先解人宣和中再為執法閤門孝友嘗彈蔡絛范丞相建炎間答其啟云久居言路抨彈多權貴之臣屢掌文衡登拔皆純正之士范射䇿日陸曾謂其不純正舒起居清國詞也汪彥章賀吕成公初大拜啟云方羣臣憂杞國之天靡遑朝夕乃兩手取虞淵之日重正乾坤孫伯野傅論髙麗人騷擾中批云至乃用蘓軾語全無顧忌孫表云不知言語之合前人但見裔夷之負中國周子武秘自中司帥越日伋在崇道外初與伋啟云訪羽人於丹丘莫繼後塵之雅躅受釐事於宣室即期前席之崇觀後見李雅州端民云某之詞也伋在建業時華藏寺一老沙彌法光誦經得度屬韓子蒼作化錢疏座間索筆草云法光身本仕族志慕佛乘依華藏以出家誦楞嚴而得度敢言四事尚乏三衣本來一物也無政須行乞他日寸絲不掛用此酧恩王叔言子游守台與伋狀云倒屣以待諸公要出我門解榻而迎使君未有此客喜接辭之伊邇仍問政之可期趙祖潁竒與伋同在太學中秋趣人作㑹啟云庾亮樓邊漸覩掛簷之月揚雄宅畔幾無載酒之人方孤坐以無聊欲就眠而未可伏惟某人輕財有朱家之度量好客繼鄭荘之風流酒滿尊中屢極詼諧之飲錢流地上曾無鄙吝之心東閣之宴欲開南樓之興不淺雖一石滅燭在淳于髠豈敢望而五斗解醒如劉伯倫不無覷也願挈青州之從事亟濡東海之波臣心若揺旌側聽黄金之諾言猶在耳盍追長夜之歡過此以還未知所措四六談麈
